<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
.controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

.search-box {
    flex: 1;
    min-width: 250px;
    padding: 12px;
    background: #2a2a2a;
    border: 1px solid steelblue;
    border-radius: 6px;
    color: #eee;
    font-size: 14px;
}

.page-size,
.refresh-button {
    padding: 12px 16px;
    background: #2a2a2a;
    border: 1px solid steelblue;
    border-radius: 6px;
    color: #eee;
    font-size: 14px;
}

.refresh-button {
    background: darkslategray;
    cursor: pointer;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #eee;
    white-space: nowrap;
}
</style>

<div class="controls">
    <input type="text" class="search-box"  id="search-box" placeholder="Search by IP or version...">

    <select class="page-size" id="page-size">
        <option value="25">25 per page</option>
        <option value="50" selected>50 per page</option>
        <option value="100">100 per page</option>
        <option value="500">500 per page</option>
    </select>

    <label class="checkbox-label">
        <input type="checkbox" id="random-toggle">
        <span style="color: #eee">Randomizer</span>
    </label>

    <label class="checkbox-label">
        <input type="checkbox" id="show-offline">
        <span style="color: #eee">Show Offline</span>
    </label>

    <button class="refresh-button" id="refresh-button">Refresh Servers</button>
</div>

<div class="server-list" id="server-list" style="color: #eee">Loading...</div>

<script>
let servers = [];
let filteredServers = [];
let serverStatuses = {};
let currentPage = 1;
let pageSize = 50;
let randomMode = false;
let showOffline = false;

async function getInfo() {
    const manifest = await fetch('/assets/minecraftscans/scans.json').then(r => r.json());
    setInfo(manifest.count, null, manifest.date);
    return manifest;
}

async function extractJSON() {
    document.getElementById('server-list').innerHTML = `<p style="color: #eee;">Loading...</div>`;

    try {
        const manifest = await getInfo();
        const response = await fetch(`/assets/minecraftscans/${manifest.latest}`);
        const blob = await response.blob();

        const zip = await JSZip.loadAsync(blob);
        const fileName = Object.keys(zip.files)[0];
        const jsonContent = await zip.file(fileName).async('string');

        servers = JSON.parse(jsonContent);
    }
    catch (err) {
        document.getElementById('server-list').innerHTML = `<p style="color: red;">Error loading scan: ${err.message}</div>`;
    }
}

function setInfo(count, players, date) {
    document.getElementById('server-count').textContent = count;
    document.getElementById('player-count').textContent = players ? players : "?";
    document.getElementById('scan-time').textContent = date;
}
</script>
