<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
.controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

.search-box {
    flex: 1;
    min-width: 250px;
    padding: 12px;
    background: #2a2a2a;
    border: 1px solid steelblue;
    border-radius: 6px;
    color: #eee;
    font-size: 14px;
}

.page-size,
.refresh-button {
    padding: 12px 16px;
    background: #2a2a2a;
    border: 1px solid steelblue;
    border-radius: 6px;
    color: #eee;
    font-size: 14px;
}

.view-json-button
.refresh-button {
    background: darkslategray;
}

.view-json-button:hover
.refresh-button:hover {
    background: steelblue;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #eee;
    white-space: nowrap;
}

.server-card {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        display: flex;
        gap: 15px;
        transition: transform 0.2s;
    }

.server-card:hover {
    border-color: steelblue;
}

.server-icon {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    object-fit: cover;
}
</style>

<div class="controls">
    <input type="text" class="search-box"  id="search-box" placeholder="Search by IP or version...">

    <select class="page-size" id="page-size">
        <option value="25">25 per page</option>
        <option value="50" selected>50 per page</option>
        <option value="100">100 per page</option>
        <option value="500">500 per page</option>
    </select>

    <label class="checkbox-label">
        <input type="checkbox" id="random-toggle">
        <span style="color: #eee">Randomizer</span>
    </label>

    <label class="checkbox-label">
        <input type="checkbox" id="show-offline">
        <span style="color: #eee">Show Offline</span>
    </label>

    <button class="refresh-button" id="refresh-button">Refresh Servers</button>
</div>

<div class="server-list" id="server-list" style="color: #eee">Loading...</div>

<script>
let servers = [];
let filteredServers = [];
let displayedServers = []; // what user sees
let serverStatuses = {}; // caching api results
let currentPage = 1;
let pageSize = 50;
let pinging = false;

function loadPreferences() {
    const savedRandom = localStorage.getItem('pref-mc-server-scanner-random');
    if (savedRandom !== null) {
        document.getElementById('random-toggle').checked = savedRandom === 'true';
    }
    const savedOffline = localStorage.getItem('pref-mc-server-scanner-offline');
    if (savedOffline !== null) {
        document.getElementById('show-offline').checked = savedOffline === 'true';
    }
}

// save for future usage
function savePreferences() {
    localStorage.setItem('pref-mc-server-scanner-random', document.getElementById('random-toggle').checked);
    localStorage.setItem('pref-mc-server-scanner-offline', document.getElementById('show-offline').checked);
}

async function init() {
    document.getElementById('server-list').innerHTML = `<p style="color: #eee;">Loading...</div>`;

    loadPreferences();

    // listeners for if the user changes while pinging
    document.getElementById('search-box').addEventListener('input', () => {
        prepareResults();
        render();
    });

    document.getElementById('page-size').addEventListener('change', (e) => {
        pageSize = parseInt(e.target.value);
        prepareResults();
        render();
    });

    document.getElementById('random-toggle').addEventListener('change', () => {
        prepareResults();
        render();
    });

    document.getElementById('show-offline').addEventListener('change', () => {
        render();
    });

    document.getElementById('refresh-button').addEventListener('click', () => {
        serverStatuses = {};
        pingVisible();
    });

    try {
        const manifest = await fetch('/assets/minecraftscans/scans.json').then(r => r.json());
        setInfo(manifest.count, null, manifest.date);

        const response = await fetch(`/assets/minecraftscans/${manifest.latest}`);
        const blob = await response.blob();

        // pretty easy to use, I'll say
        const zip = await JSZip.loadAsync(blob);
        const fileName = Object.keys(zip.files)[0];
        const jsonContent = await zip.file(fileName).async('string');

        servers = JSON.parse(jsonContent);
        prepareResults();
        render();
    }
    catch (err) {
        document.getElementById('server-list').innerHTML = `<p style="color: red;">Error loading scan: ${err.message}</div>`;
    }
}

function setInfo(count, players, date) {
    document.getElementById('server-count').textContent = count;
    document.getElementById('player-count').textContent = players ? players : "?";
    document.getElementById('scan-time').textContent = date;
}

function prepareResults() {
    const randomMode = document.getElementById('random-toggle').checked;
    const showOffline = document.getElementById('show-offline').checked;
    const searchTerm = document.getElementById('search-box').value.toLowerCase();

    let filtered = servers.filter(server =>
        (server.ip && server.ip.toLowerCase().includes(searchTerm)) ||
        (server.version && server.version.toLowerCase().includes(searchTerm))
    );

    if (randomMode) {
        filtered = filtered.sort(() => Math.random() - 0.5); // using this because it is easier
    }

    filteredServers = filtered;
    currentPage = 1;
}

function render() {
    const serverListDiv = document.getElementById('server-list');
    const showOffline = document.getElementById('show-offline').checked;

    displayedServers = [];
    let checked = 0;

    for (let i = 0; i < filteredServers.length; i++) {
        if (displayedServers.length >= pageSize) break;

        const server = filteredServers[i];
        const key = `${server.ip}:${server.port}`;
        const status = serverStatuses[key];

        if (!showOffline && status && !status.online) continue;

        displayedServers.push(server);
    }

    if (displayedServers.length === 0 && filteredServers.length === 0) {
        serverListDiv.innerHTML = `<p style="color: red;">No servers found matching search.</p>`;
        return;
    }

    serverListDiv.innerHTML = '';

    displayedServers.forEach(server => {
        const key = `${server.ip}:${server.port}`;
        const status = serverStatuses[key];

        const card = document.createElement('div');
        card.className = 'server-card';

        let iconHtml = `<div class="server-icon">No Icon</div>`;
        let detailsHtml = `<div><strong style="color: #eee;">${key}</strong><br><span style="color: #eee;">Pinging server status...</span></div>`;
        let buttonHtml = '';

        if (status) {
            buttonHtml = `<button class="view-json-button" style="margin-left: auto; height: fit-content;" onclick="viewRawJson('${key}')">View Raw JSON</button>`;

            if (status.online) {
                if (status.icon) {
                    iconHtml = `<img src="${status.icon}" class="server-icon" alt="icon">`;
                }

                let motd = 'No MOTD provided';
                if (status.motd && status.motd.html) {
                    motd = status.motd.html.join('<br>');
                }
                else if (status.motd && status.motd.clean) {
                    motd = status.motd.clean.join('<br>');
                }

                if (!status.players.online || !status.players.max || !status.version) return;

                const currentPlayers = status.players.online || 0;
                const maxPlayers = status.players.max || 0
                const gameVersion = status.version || "Unknown";

                detailsHtml = `
                    <div>
                        <strong style="color: #eee;">${key}</strong> <span style="color: lime;">[Online]</span><br>
                        <span style="color: #eee;">Version: ${gameVersion}</span><br>
                        <span style="color: #eee;">Players: ${currentPlayers}/${maxPlayers}</span><br>
                        <div style="margin-top: 5px; font-family: monospace; background: #1a1a1a; padding: 4px; border-radius: 4px;">${motd}</div>
                    </div>
                `;
            }
            else {
                card.style.opacity = '0.5';
                card.style.border = '1px dashed red';
                detailsHtml = `<div><strong style="color: #eee;">${key}</strong> <span style="color: red;">Offline</span></div>`;
            }
        }

        card.innerHTML = iconHtml + detailsHtml + buttonHtml;
        serverListDiv.appendChild(card);
    });

    pingVisible();
}

function viewRawJson(key) {
    window.open(`https://api.mcsrvstat.us/3/${key}`, '_blank');
}

async function ping(ip, port) {
    const key = `${ip}:${port}`;
    const maxRetries = 3;

    for (let i = 0; i < maxRetries; i++) {
        try {
            const response = await fetch(`https://api.mcsrvstat.us/3/${key}`);
            if (!response.ok) throw new Error('API or request error');
            const data = await response.json();

            serverStatuses[key] = data;
            return data;
        }
        catch (e) {
            if (i === maxRetries - 1) { // failing to ping = offline
                serverStatuses[key] = {online: false};
            }
            else {
                await new Promise(retry => setTimeout(retry, 500));
            }
        }
    }
}

async function pingVisible() {
    if (pinging) return;
    pinging = true;

    for (const server of displayedServers) {
        const key = `${server.ip}:${server.port}`;
        if (serverStatuses[key]) continue;

        await ping(server.ip, server.port);
        render();

        await new Promise(resolve => setTimeout(resolve, 500));
    }

    isPinging = false;
}

init();
</script>
