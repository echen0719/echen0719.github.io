<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
.controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

.search-box {
    flex: 1;
    min-width: 250px;
    padding: 12px;
    background: #2a2a2a;
    border: 1px solid steelblue;
    border-radius: 6px;
    color: #eee;
    font-size: 14px;
}

.page-size,
.refresh-button {
    padding: 12px 16px;
    background: #2a2a2a;
    border: 1px solid steelblue;
    border-radius: 6px;
    color: #eee;
    font-size: 14px;
}

.refresh-button {
    background: darkslategray;
}

.refresh-button:hover {
    background: steelblue;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #eee;
    white-space: nowrap;
}

.server-card {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        display: flex;
        gap: 15px;
        transition: transform 0.2s;
    }

.server-card:hover {
    border-color: steelblue;
}

.server-icon {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    object-fit: cover;
}
</style>

<div class="controls">
    <input type="text" class="search-box"  id="search-box" placeholder="Search by IP or version...">

    <select class="page-size" id="page-size">
        <option value="25">25 per page</option>
        <option value="50" selected>50 per page</option>
        <option value="100">100 per page</option>
        <option value="500">500 per page</option>
    </select>

    <label class="checkbox-label">
        <input type="checkbox" id="random-toggle">
        <span style="color: #eee">Randomizer</span>
    </label>

    <label class="checkbox-label">
        <input type="checkbox" id="show-offline">
        <span style="color: #eee">Show Offline</span>
    </label>

    <button class="refresh-button" id="refresh-button">Refresh Servers</button>
</div>

<div class="server-list" id="server-list" style="color: #eee">Loading...</div>

<script>
let servers = [];
let filteredServers = [];
let displayedServers = []; // what user sees
let serverStatuses = {}; // caching api results
let currentPage = 1;
let pageSize = 50;
let pinging = false;

async function init() {
    document.getElementById('server-list').innerHTML = `<p style="color: #eee;">Loading...</div>`;

    try {
        const manifest = await fetch('/assets/minecraftscans/scans.json').then(r => r.json());
        setInfo(manifest.count, null, manifest.date);

        const response = await fetch(`/assets/minecraftscans/${manifest.latest}`);
        const blob = await response.blob();

        // pretty easy to use, I'll say
        const zip = await JSZip.loadAsync(blob);
        const fileName = Object.keys(zip.files)[0];
        const jsonContent = await zip.file(fileName).async('string');

        servers = JSON.parse(jsonContent);
        prepareResults();
    }
    catch (err) {
        document.getElementById('server-list').innerHTML = `<p style="color: red;">Error loading scan: ${err.message}</div>`;
    }
}

function setInfo(count, players, date) {
    document.getElementById('server-count').textContent = count;
    document.getElementById('player-count').textContent = players ? players : "?";
    document.getElementById('scan-time').textContent = date;
}

function prepareResults() {
    const randomMode = document.getElementById('random-toggle').checked;
    const searchTerm = document.getElementById('search-box').value.toLowerCase();

    let filtered = allServers.filter(server =>
        (server.ip && server.ip.toLowerCase().includes(searchTerm)) ||
        (server.version && server.version.toLowerCase().includes(searchTerm))
    );

    if (randomMode) {
        filtered = filtered.sort(() => Math.random() - 0.5); // using this because it is easier
    }

    filteredServers = filtered;
    currentPage = 1;
}

function render() {
    const serverListDiv = document.getElementById('server-list');

    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    displayedServers = filteredServers.slice(start, end);

    if (displayedServers.length === 0) {
        serverListDiv.innerHTML = `<p style="color: red;">No servers found matching query constraints.</p>`;
        return;
    }

    displayedServers.forEach(server => {

    }
}

async function ping(ip, port) {
    const key = `${ip}:${port}`;
    const maxRetries = 3;

    for (let i = 0; i < maxRetries; i++) {
        try {
            const response = await fetch(`https://api.mcsrvstat.us/3/${key}`);
            if (!response.ok) throw new Error('API or request error');
            const data = await response.json();

            serverStatuses[key] = data;
            return data;
        }
        catch (e) {
            if (i === maxRetries - 1) { // failing to ping = offline
                serverStatuses[key] = {online: false};
            }
            else {
                await new Promise(retry => setTimeout(retry, 500));
            }
        }
    }
}

async function pingVisible() {
    if (pinging) return;
    pinging = true;

    const showOffline = document.getElementById('show-offline').checked;

    for (const server of displayedServers) {
        const key = `${server.ip}:${server.port}`;
        if (serverStatuses[key]) continue;

        await ping(server.ip, server.port);
    }

    isPinging = false;

    // if user decides to toggle during ping
    if (!showOffline) {
        renderPage();
    }
}
</script>
